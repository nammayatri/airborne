			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "#!/bin/sh\nFRAMEWORK_NAME=\"Airborne\"\n\nFRAMEWORK=\"${UNIVERSAL_LIBRARY_DIR}/${FRAMEWORK_NAME}.framework\"\n\nOUTPUT_DIR=\"./${FRAMEWORK_NAME}-Framework\"\n\n# Clean and build the framework for the iOS simulator\nxcodebuild -project ${FRAMEWORK_NAME}.xcodeproj \\\n    -scheme ${FRAMEWORK_NAME} \\\n    -sdk iphonesimulator \\\n    -configuration ${CONFIGURATION} \\\n    -destination 'generic/platform=iOS Simulator' \\\n    clean build \\\n    CONFIGURATION_BUILD_DIR=${BUILD_DIR}/Release-iphonesimulator \\\n    -UseModernBuildSystem=YES > /dev/null\n\n# Clean and build the framework for iOS devices\nxcodebuild -project ${FRAMEWORK_NAME}.xcodeproj \\\n    -scheme ${FRAMEWORK_NAME} \\\n    -sdk iphoneos \\\n    -configuration ${CONFIGURATION} \\\n    -destination 'generic/platform=iOS' \\\n    build \\\n    CONFIGURATION_BUILD_DIR=${BUILD_DIR}/${CONFIGURATION}-iphoneos \\\n    -UseModernBuildSystem=YES > /dev/null\n\n# Remove any existing build directories\nrm -rf \"${BUILD_DIR}/iphone\"\nrm -rf \"${BUILD_DIR}/simulator\"\n\n# Create directories to hold device and simulator builds\nmkdir \"${BUILD_DIR}/iphone\"\nmkdir \"${BUILD_DIR}/simulator\"\n\nrm -rf ${BUILD_DIR}/${FRAMEWORK_NAME}.xcframework\ncp -r ${BUILD_DIR}/${CONFIGURATION}-iphoneos/${FRAMEWORK_NAME}.framework ${BUILD_DIR}/iphone/${FRAMEWORK_NAME}.framework\ncp -r ${BUILD_DIR}/${CONFIGURATION}-iphonesimulator/${FRAMEWORK_NAME}.framework ${BUILD_DIR}/simulator/${FRAMEWORK_NAME}.framework\n\n# Create an XCFramework from the device and simulator builds\nxcrun xcodebuild -create-xcframework -framework ${BUILD_DIR}/iphone/${FRAMEWORK_NAME}.framework -framework ${BUILD_DIR}/simulator/${FRAMEWORK_NAME}.framework -output ${BUILD_DIR}/${FRAMEWORK_NAME}.xcframework\n\nrm -rf \"$OUTPUT_DIR/${FRAMEWORK_NAME}.xcframework\"\nmkdir -p \"$OUTPUT_DIR\"\n\n# Copy the XCFramework to the output directory\ncp -r ${BUILD_DIR}/${FRAMEWORK_NAME}.xcframework ${OUTPUT_DIR}\n\nopen \"${OUTPUT_DIR}\"\n\n";
		};
